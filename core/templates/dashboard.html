{% extends 'base.html' %}
{% block content %}
        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Stats Cards -->
            <div class="row">
                <div class="col-md-3">
                    <div class="card shadow card-box">
                        <div class="card-body">
                            <h6>Total Blog</h6>
                            <h3>{{ blog_count }}</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow card-box border-success">
                        <div class="card-body">
                            <h6>Categories</h6>
                            <h3>{{ category_count }}</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow card-box border-warning">
                        <div class="card-body">
                            <h6>Comments</h6>
                            <h3>450</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow card-box border-danger">
                        <div class="card-body">
                            <h6>Users</h6>
                            <h3>35</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Posts Table -->
            <div class="card mt-4 shadow">
                <div class="card-header">
                    <h5>Recent Posts</h5>
                </div>
                <div class="card-body table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>How to Learn Django</td>
                                <td>Programming</td>
                                <td><span class="badge bg-success">Published</span></td>
                                <td>
                                    <button class="btn btn-sm btn-primary">Edit</button>
                                    <button class="btn btn-sm btn-danger">Delete</button>
                                </td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Blog SEO Tips</td>
                                <td>Marketing</td>
                                <td><span class="badge bg-warning">Draft</span></td>
                                <td>
                                    <button class="btn btn-sm btn-primary">Edit</button>
                                    <button class="btn btn-sm btn-danger">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

</body>
</html>
