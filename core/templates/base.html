{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            min-height: 100vh;
            background: #212529;
            color: white;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
        }
        .sidebar a:hover {
            background: #343a40;
            color: white;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-0">
            <h4 class="text-center py-3 border-bottom">Blog Admin</h4>
            <a href="{% url 'dashboard_home' %}">Dashboard</a>
            <a href="{% url 'blog_list' %}">Blogs</a>
            <a href="{% url 'cat_list' %}">Categories</a>
            <a href="{% url 'media_list' %}">Social Links</a>
            <a href="{% url 'about_list' %}">About Us</a>
            <a href="#">Users</a>
            <a href="{% url 'logout' %}" class="text-danger">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Dashboard</h3>
                <span class="text-muted">
                    Welcome, <strong>{{ user }}</strong>
                </span>
            </div>

            {% block content %}
            <!-- Page specific content goes here -->
            {% endblock %}

        </div>

    </div>
</div>

</body>
</html>
